<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flask Weather App</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="text-center">Weather Forecast</h2>
        
        <form method="POST" class="d-flex justify-content-center mt-4">
            <input type="text" name="city" class="form-control w-50" placeholder="Enter city name..." required>
            <button type="submit" class="btn btn-primary ms-2">Search</button>
        </form>

        <hr>

        {% if error %}
            <div class="alert alert-danger text-center">{{ error }}</div>
        {% endif %}

        {% if weather %}
            <div class="card mx-auto mt-4" style="max-width: 400px;">
                <div class="card-body text-center">
                    <h3 class="card-title">{{ weather.name }}, {{ weather.sys.country }}</h3>
                    <img src="http://openweathermap.org/img/wn/{{ weather.weather[0].icon }}@2x.png" alt="weather icon">
                    <h1>{{ weather.main.temp }}°C</h1>
                    <p class="text-capitalize">{{ weather.weather[0].description }}</p>
                    <p>Humidity: {{ weather.main.humidity }}%</p>
                </div>
            </div>
        {% endif %}
    </div>
</body>
</html>
